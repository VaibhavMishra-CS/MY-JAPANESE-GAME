<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanji Quest</title>
    <style>
        body {font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f4f4f9; }
        #game-container { text-align: center; background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        #prompt { font-size: 4rem; margin-bottom: 1rem; }
        input { font_size: 1,5rem; padding: 0.5rem; text-align: center; border: 2px solid #ccc; border-radius: 8px; }
        #feedback { margin-top: 1rem; font-weight: bold;}
    </style>
</head>
<body>
    <div id="game-container">
        <div id="prompt">---</div>
        <input type="text" id="answer" placeholder="Type reading..." autocomplete="off">
        <div id="feedback"></div>
    </div>
    <script src="main.js"></script>
</body>
</html>
